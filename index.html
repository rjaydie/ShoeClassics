<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Shoe Classics</title>
    <style>
        :root {
            --txt-clr: linear-gradient(45deg, #000)
        }
        *{
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: sans-serif;
            text-decoration: none;
            list-style: none;
        }

        .hero{
            min-height: 100vh;
            background-image: url("gew.jpg");
            background-position: center;
            background-size: cover;
            background-repeat: no-repeat;
        }

        nav{
            display: flex;
            align-items: center;
            justify-content: space-around;
            width: 98%;
            padding: 5px 0;
            margin: auto;
            border-bottom: 2px solid #fff;
        }

        .logo{
            width: 150px;
        }

        nav ul{
            display: flex;
            align-items: center;
        }

        nav ul li{
            margin: 0 20px;
        }

        nav ul li a{
            font-size: 15px;
            color: #fff;
            text-transform: uppercase;
        }

        nav ul li a:hover{
            color: #fff;
            border-bottom: 2px solid #fff;
        }

        nav button{
            padding: 11px 35px;
            background: transparent;
            color: #fff;
            border-radius: 2rem;
            font-size: 15px;
            font-weight: 600;
            cursor: pointer;
            transition: .3s;
        }
        
        nav button:hover{
            border: 2px solid #fff;
            color: #fff;
            scale: .8;
            box-shadow: 0 0 20px #fff;
        }

        .content{
            position: absolute;
            top: 35%;
            left: 90px;
        }

        h2{
            color: #fff;
            font-size: 52px;
            text-transform: uppercase;
            font-weight: 800;
        }
        h2 span{
            background:var(--txt-clr);
            -webkit-text-fill-color:transparent;
            -webkit-background-clip: text;
        }

        p{
            font-size: 11px;
            margin-top: 10px;
            color: black;
        }

        .content button{
            margin-top: 50px;
            padding: 12px 45px;
            background: #fff;
            color: black;
            border: none;
            border-radius: 2rem;
            font-size: 15px;
            font-weight: 600;
            cursor: pointer;
            transition: .3s;
        }

        .content button:hover{
            scale: .9;
        }

        .content button.know_more{
            border: 2px solid #fff;
            color: #fff;
            margin-left: 25px;
            background: transparent;
        }

        .content button.know_more:hover{
            border: 2px solid #fff;
            color: #fff;
            scale: .8;
            box-shadow: 0 0 30px #fff
        }

        body{
            background-image: url("MainBG.jpg");
            height: 100vh;
            background-size: cover;
        }

    </style>
</head>
<body>
    <div class="hero">
        <nav>
            <img src="Mainlogo.png" class="logo">

            <ul>
                <li><a href="index.html">Home</a></li>
                <li><a href="Products.html">Products</a></li>
                <li><a href="About.html">About Us</a></li>
                <li><a href="contact.html">Contact Us</a></li>
            </ul>
            <button>more</button>
        </nav>

        <div class="content">
            <h2>Elevate your stride<br>with <span>Classic</span> style</h2>
            <p>Step into a world where style meets comfort, enhancing every stride with quality craftmanship
                and Classic design, because your feet derserve the best.
            </p>

            <button>Order Now</button>
            <button class="know_more">Know More</button>
        </div>
    </div>
</body>
</html>
