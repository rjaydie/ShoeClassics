<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Shoe Classics</title>
    <style>

        :root {
            --txt-clr: linear-gradient(45deg, #000)
        }

        *{
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: sans-serif;
            text-decoration: none;
            list-style: none;
        }

        .hero{
            min-height: 100vh;
            background-image: url("gew.jpg");
            background-position: center;
            background-size: cover;
            background-repeat: no-repeat;
        }

        nav{
            display: flex;
            align-items: center;
            justify-content: space-around;
            width: 98%;
            padding: 5px 0;
            margin: auto;
            border-bottom: 2px solid #fff;
        }

        .logo{
            width: 150px;
        }

        nav ul{
            display: flex;
            align-items: center;
        }

        nav ul li{
            margin: 0 20px;
        }

        nav ul li a{
            font-size: 15px;
            color: #fff;
            text-transform: uppercase;
        }

        nav ul li a:hover{
            color: #fff;
            border-bottom: 2px solid #fff;
        }

        nav button{
            padding: 11px 35px;
            background: transparent;
            color: #fff;
            border-radius: 2rem;
            font-size: 15px;
            font-weight: 600;
            cursor: pointer;
            transition: .3s;
        }
        
        nav button:hover{
            border: 2px solid #fff;
            color: #fff;
            scale: .8;
            box-shadow: 0 0 20px #fff;
        }

        .contact {
            background: white;
        }

        .contact-form {
            max-width: 520px;
            margin: auto;
            display: flex;
            flex-direction: column;
        }

        .contact-form input,
        .contact-form textarea {
            margin-bottom: 18px;
            padding: 14px;
            font-size: 14px;
            border: 1px solid #ddd;
        }

        .contact-form input:focus,
        .contact-form textarea:focus {
            border-color: black;
        }

        .contact-form button {
            padding: 14px;
            background: black;
            color: #fff;
            border: none;
            cursor: pointer;
            transition: 0.03s;
        }

        .contact-form button:hover {
            background: brown;
            color: #000;
        }

        body{
            background-image: url("MainBG.jpg");
            height: 100vh;
            background-size: cover;
        }

        /* ========== FOOTER ========= */
        .footer {
            text-align: center;
            padding: 35px;
            background: #f2f2f2;
            font-size: 14px;
            color: #555;
        }
    </style>
</head>
<body>

    <div class="hero">
        <nav>
            <img src="Mainlogo.png" class="logo">

            <ul>
                <li><a href="index.html">Home</a></li>
                <li><a href="Products.html">Products</a></li>
                <li><a href="About.html">About Us</a></li>
                <li><a href="contact.html">Contact Us</a></li>
            </ul>
            <button>more</button>
        </nav>

        <section class="Contact" id="Contact">
        <span class="section-tag center"></span>
        <h2 class="section-title"></h2>

        <br><br><br><br><form class="contact-form">
            <input type="text" placeholder="Your Name" required>
            <input type="email" placeholder="Email Address" required>
            <textarea placeholder="Tell us about your Shoes"></textarea>

            <button>Send Enquiry</button>
        </form>
    </section>
    </div>

    <footer class="footer">
        <p>&copy; Lanzaderas RJB. Web developer</p>
    </footer>
</body>
</html>
